name: Build

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner'
        required: true
        type: string
        default: 'self-hosted' # ubuntu-latest
      full:
        description: 'Full build (arm + arm64). Default: arm64 only.'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 0 */16 * *'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update
        run: |
          cd vanadium
          git fetch --tags
          git checkout $(git tag | sort -V | tail -n1)
          cd ..
          git add vanadium
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --staged --quiet; then
            git commit -am "update"
            git push
          fi

      - name: Set ENV
        run: |
          chmod +x *.sh
          echo "unix_time=$(date +%s)" >> $GITHUB_ENV
          echo "VERSION=$(grep -m1 -o '[0-9]\+\(\.[0-9]\+\)\{3\}' vanadium/args.gn)" >> $GITHUB_ENV

      # ── ccache: persists compiled objects between runs ──────────────────────
      # args.gn sets cc_wrapper="ccache" so autoninja actually uses it.
      # Cold build (no cache): ~3h arm64 / ~6h arm+arm64.
      # Warm build (cache hit): ~10-20 min for small deltas.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: chromium-android-${{ env.VERSION }}
          restore-keys: chromium-android-
          max-size: 15G
          verbose: 2

      - name: Build
        env:
          DEBIAN_FRONTEND: noninteractive
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          # Make ccache binary available — autoninja will call it via cc_wrapper in args.gn
          sudo apt-get install -y ccache
          export PATH="/usr/lib/ccache:$PATH"
          if [ "${{ inputs.full }}" = "true" ]; then
            ./build.sh
          else
            ./build-android-fast.sh
          fi

      - name: ccache stats
        if: always()
        run: ccache -s || true

      # ── Full build artifacts (arm + arm64) ──────────────────────────────────
      - name: Set (full)
        if: ${{ inputs.full == true }}
        run: |
          V=$(find chromium/src/out/release -name '*arm64-v8a.apk' | sed 's/.*\///;s/\-arm64-v8a.apk$//')
          echo "VERSION=$V" >> $GITHUB_ENV
          mv $(find chromium/src/out/release -name '*arm64-v8a.aab') $V-${{ env.unix_time }}-arm64-v8a.aab
          mv $(find chromium/src/out/release -name '*arm64-v8a.apk') $V-${{ env.unix_time }}-arm64-v8a.apk
          mv $(find chromium/src/out/release -name '*armeabi-v7a.apk') $V-${{ env.unix_time }}-armeabi-v7a.apk

      - name: Publish (full)
        if: ${{ inputs.full == true }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: |
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.aab
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.apk
            ${{ env.VERSION }}-${{ env.unix_time }}-armeabi-v7a.apk

      - name: Attest (full)
        if: ${{ inputs.full == true }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.aab
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.apk
            ${{ env.VERSION }}-${{ env.unix_time }}-armeabi-v7a.apk

      # ── Fast build artifacts (arm64 only) ───────────────────────────────────
      - name: Set (fast / arm64)
        if: ${{ inputs.full != true }}
        run: |
          V=$(find chromium/src/out/release -name '*arm64-v8a.apk' | sed 's/.*\///;s/\-arm64-v8a.apk$//')
          echo "VERSION=$V" >> $GITHUB_ENV
          mv $(find chromium/src/out/release -name '*arm64-v8a.aab') $V-${{ env.unix_time }}-arm64-v8a.aab
          mv $(find chromium/src/out/release -name '*arm64-v8a.apk') $V-${{ env.unix_time }}-arm64-v8a.apk

      - name: Publish (fast / arm64)
        if: ${{ inputs.full != true }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ env.VERSION }}-arm64
          tag_name: v${{ env.VERSION }}-${{ env.unix_time }}-arm64
          files: |
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.aab
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.apk

      - name: Attest (fast / arm64)
        if: ${{ inputs.full != true }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.aab
            ${{ env.VERSION }}-${{ env.unix_time }}-arm64-v8a.apk
